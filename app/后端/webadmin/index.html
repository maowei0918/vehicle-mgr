<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚗</text></svg>">
<title id="page-title">车辆管理系统</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,"Microsoft YaHei",sans-serif; background:#0F0F19; color:#E0E0E0; min-height:100vh; display:flex; }
.sidebar { width:200px; background:#1A1A2E; padding:20px 0; flex-shrink:0; overflow-y:auto; }
.sidebar h2 { padding:0 20px 20px; color:#E82337; font-size:18px; border-bottom:1px solid #2A2A3E; }
.sidebar a { display:block; padding:12px 20px; color:#888; text-decoration:none; cursor:pointer; font-size:14px; }
.sidebar a:hover,.sidebar a.active { color:#fff; background:#2A2A3E; }
.main { flex:1; padding:24px; overflow-y:auto; max-height:100vh; }
.card { background:#1A1A2E; border-radius:12px; padding:20px; margin-bottom:16px; }
table { width:100%; border-collapse:collapse; }
th,td { padding:10px 12px; text-align:left; border-bottom:1px solid #2A2A3E; font-size:14px; }
th { color:#888; font-weight:normal; }
tr:hover { background:#2A2A3E; }
.btn { display:inline-block; padding:6px 16px; border-radius:6px; border:none; cursor:pointer; font-size:13px; margin:2px; }
.btn-primary { background:#E82337; color:#fff; }
.btn-secondary { background:#2A2A3E; color:#E0E0E0; border:1px solid #3A3A50; }
.btn-danger { background:#B71C1C; color:#fff; }
.btn-success { background:#1B5E20; color:#fff; }
.btn-sm { padding:4px 10px; font-size:12px; }
input,select,textarea { background:#2A2A3E; border:1px solid #3A3A50; color:#E0E0E0; padding:8px 12px; border-radius:6px; font-size:14px; width:100%; box-sizing:border-box; }
input:focus,select:focus { outline:none; border-color:#E82337; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:13px; color:#888; margin-bottom:4px; }
.page-title { font-size:22px; font-weight:bold; margin-bottom:16px; }
.tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:12px; }
.tag-admin { background:#1A237E; color:#7986CB; }
.tag-fleet_manager { background:#004466; color:#4FC3F7; }
.tag-repair_shop { background:#334400; color:#8BC34A; }
.tag-driver { background:#665500; color:#FFD700; }
.tag-dispatched { background:#665500; color:#FFD700; }
.tag-accepted { background:#004466; color:#4FC3F7; }
.tag-completed { background:#1A237E; color:#7986CB; }
.tag-verified { background:#1B5E20; color:#81C784; }
.hidden { display:none !important; }
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:100; }
.modal-content { background:#1A1A2E; border-radius:12px; padding:24px; width:500px; max-width:90vw; max-height:80vh; overflow-y:auto; }
.modal-content h3 { margin-bottom:16px; }
.toast { position:fixed; top:20px; right:20px; background:#1B5E20; color:#fff; padding:12px 20px; border-radius:8px; z-index:200; font-size:14px; }
.toast.error { background:#B71C1C; }
.row { display:flex; gap:12px; }
.row > * { flex:1; }
.filter-bar { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:16px; }
.filter-bar .form-group { margin-bottom:0; min-width:140px; }
.toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
.pagination { display:flex; align-items:center; gap:12px; justify-content:center; margin-top:12px; color:#888; font-size:13px; }
@media (max-width:768px) { .sidebar { display:none; } .row { flex-direction:column; } }
</style></head><body>

<div id="page-login" style="width:100%;display:flex;align-items:center;justify-content:center;">
  <div class="card" style="width:360px;padding:40px;">
    <h2 style="text-align:center;color:#E82337;margin-bottom:24px;">🚗 车辆管理系统 v0.0.1-beta.7</h2>
    <div class="form-group"><label>用户名</label><input id="login-user" value="admin" /></div>
    <div class="form-group"><label>密码</label><input id="login-pass" type="password" value="admin123" onkeydown="if(event.key==='Enter')login()" /></div>
    <button class="btn btn-primary" style="width:100%;padding:10px;font-size:15px;margin-top:8px;" onclick="login()">登录</button>
    <p style="text-align:center;color:#555;font-size:12px;margin-top:16px;">默认账号: admin / admin123</p>
  </div>
</div>

<div id="page-main"></div>

<script>
let TOKEN = '';
let R = null;
let P = [];
const BASE = window.location.origin;

function hasPerm(key) { return P && P.includes(key); }

async function api(method, path, body) {
  const opt = { method, headers: { 'Authorization': 'Bearer ' + TOKEN } };
  if (body) { opt.headers['Content-Type'] = 'application/json'; opt.body = JSON.stringify(body); }
  const r = await fetch(BASE + path, opt);
  if (r.status === 401) { toast('登录过期', true); logout(); return null; }
  if (r.status === 204) return null;
  if (!r.ok) { const d = await r.json().catch(()=>({})); throw new Error(d.detail || r.statusText); }
  const ct = r.headers.get('content-type') || '';
  if (ct.includes('text/csv')) { const blob = await r.blob(); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); return a; }
  return r.json();
}

async function downloadCSV(path, filename) {
  try {
    const r = await fetch(BASE + path, { headers: { 'Authorization': 'Bearer ' + TOKEN } });
    if (!r.ok) throw new Error('导出失败');
    const blob = await r.blob();
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
    toast('导出成功');
  } catch(e) { toast('导出失败: ' + e.message, true); }
}

async function login() {
  try {
    const d = await fetch(BASE + '/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: document.getElementById('login-user').value, password: document.getElementById('login-pass').value }) }).then(r => { if(!r.ok) throw new Error('登录失败'); return r.json(); });
    TOKEN = d.token;
    R = d.user;
    P = d.user.permissions || [];
    // 加载网站标题
    fetch(BASE + '/api/settings/site-title').then(function(r){return r.json()}).then(function(d){if(d&&d.title){document.title=d.title;var t=document.getElementById('page-title');if(t)t.textContent=d.title;}}).catch(function(){});
    document.getElementById('page-login').style.display = 'none';
    var sidebarLinks = [
      {id:'dashboard',icon:'📊',label:'概况',perm:''},
      {id:'users',icon:'👥',label:'用户管理',perm:'user.view'},
      {id:'groups',icon:'📁',label:'分组管理',perm:'group.view'},
      {id:'vehicles',icon:'🚙',label:'车辆管理',perm:'vehicle.view'},
      {id:'new_inspection',icon:'📋',label:'车辆日检',perm:'inspection.report'},
      {id:'inspections',icon:'📋',label:'日检管理',perm:'inspection.view'},
      {id:'repairs',icon:'🔧',label:'维修管理',perm:'repair.view'},
      {id:'repair_flows',icon:'🔄',label:'维修流程',perm:'repair_flow.view'},
      {id:'repair_workbench',icon:'🏪',label:'接单工作台',perm:'repair.view'},
      {id:'contract',icon:'📦',label:'合同配件',perm:'contract.view'},
      {id:'roles',icon:'🔐',label:'角色管理',perm:'user.edit'},
      {id:'logs',icon:'📝',label:'操作日志',perm:'log.view'},
      {id:'settings',icon:'⚙️',label:'系统设置',perm:'settings.edit'},
    ];
    var sideHtml = '<div class="sidebar"><h2>🚗 车辆管理</h2>';
    for(var i=0;i<sidebarLinks.length;i++){
      var l=sidebarLinks[i];
      if(l.perm && !hasPerm(l.perm)) continue;
      sideHtml += '<a onclick="switchPage(\''+l.id+'\',this)">'+l.icon+' '+l.label+'</a>';
    }
    sideHtml += '<div style="border-top:1px solid #2A2A3E;margin-top:20px;padding-top:20px;"><a onclick="logout()">🚪 退出登录</a></div></div><div class="main" id="page-content"></div>';
    const pm = document.getElementById('page-main');
    pm.innerHTML = sideHtml;
    pm.style.display = 'flex';
    // drawer
    const style = document.createElement('style'); style.textContent = '.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:1001;background:#E82337;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:18px;cursor:pointer;}.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;}.sidebar-drawer{display:none;position:fixed;top:0;left:0;width:260px;height:100%;background:#1A1A2E;z-index:1000;transform:translateX(-100%);transition:transform 0.3s ease;overflow-y:auto;padding:20px 0;}.sidebar-drawer.open{transform:translateX(0);}.sidebar-drawer h2{padding:0 20px 20px;color:#E82337;font-size:18px;border-bottom:1px solid #2A2A3E;}.sidebar-drawer a{display:block;padding:14px 20px;color:#888;text-decoration:none;cursor:pointer;font-size:15px;}.sidebar-drawer a:hover,.sidebar-drawer a.active{color:#fff;background:#2A2A3E;}@media(max-width:768px){.menu-toggle{display:block;}.sidebar{display:none;}.sidebar-overlay.show,.sidebar-drawer.open{display:block;}.main{padding:12px;padding-top:56px;}}'; document.head.appendChild(style);
    const toggle = document.createElement('button'); toggle.className = 'menu-toggle'; toggle.textContent = '☰'; toggle.onclick = function(){ const d=document.querySelector('.sidebar-drawer'); const o=document.querySelector('.sidebar-overlay'); if(d&&o){d.classList.toggle('open');o.classList.toggle('show');} }; document.body.appendChild(toggle);
    const overlay = document.createElement('div'); overlay.className = 'sidebar-overlay'; overlay.onclick = function(){ const d=document.querySelector('.sidebar-drawer'); const o=document.querySelector('.sidebar-overlay'); if(d&&o){d.classList.remove('open');o.classList.remove('show');} }; document.body.appendChild(overlay);
    const drawer = document.createElement('div'); drawer.className = 'sidebar-drawer'; drawer.innerHTML = document.querySelector('.sidebar').innerHTML; drawer.querySelectorAll('a').forEach(function(a){ const orig=a.onclick; a.onclick=function(e){ if(orig) orig.call(this,e); const d=document.querySelector('.sidebar-drawer'); const o=document.querySelector('.sidebar-overlay'); if(d&&o){d.classList.remove('open');o.classList.remove('show');} }; }); document.body.appendChild(drawer);
    switchPage('dashboard');
  } catch(e) { toast('登录失败: ' + e.message, true); }
}

function logout() { TOKEN = ''; document.getElementById('page-login').style.display = 'flex'; document.getElementById('page-main').innerHTML = ''; document.getElementById('page-main').style.display = 'none'; }

function switchPage(name, el) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  const content = document.getElementById('page-content');
  if (window['page_' + name]) window['page_' + name](content);
}

function downloadTemplate(type) {
  const urls = { users: '/api/users/template.xlsx', vehicles: '/api/vehicles/template.xlsx' };
  const names = { users: 'user-import-template.xlsx', vehicles: 'vehicle-import-template.xlsx' };
  window.open(BASE + urls[type], '_blank');
  toast(`正在下载 ${names[type]}...`);
}

async function loadShopSelect(selId) {
  try {
    const r = await api('GET','/api/repairs/shops');
    if (r && r.shops) {
      const sel = document.getElementById(selId);
      if (sel) {
        const cur = sel.value;
        sel.innerHTML = '<option value="">全部</option>' + r.shops.map(s => `<option value="${s}" ${cur===s?'selected':''}>${s}</option>`).join('');
      }
    }
  } catch(e) { /* silent */ }
}

function downloadXLSX(url, filename) {
  // 下载 xlsx 文件
  const a = document.createElement('a');
  a.href = BASE + url;
  a.download = filename || 'export.xlsx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function roleName(r) { return ({ admin:'管理员', fleet_manager:'车管员', repair_shop:'汽修厂', driver:'司机' })[r] || r; }
function statusName(s) { return ({ dispatched:'已派单', accepted:'已接单', completed:'已完成', verified:'已验收' })[s] || s; }
function closeOverlay() { const m = document.querySelector('.modal-overlay'); if(m) m.remove(); }
function toast(msg, isError) { const el = document.createElement('div'); el.className = 'toast' + (isError?' error':''); el.textContent = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 3000); }

// ====== 概况 ======
async function page_dashboard(el) {
  el.innerHTML = '<div class="page-title">📊 概况</div><div class="card"><p>加载中...</p></div>';
  try {
    const [users, vehs, grps] = await Promise.all([ api('GET','/api/users'), api('GET','/api/vehicles'), api('GET','/api/groups') ]);
    if (!users || !vehs || !grps) return;
    el.innerHTML = `<div class="page-title">📊 概况</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <div class="card" style="flex:1;min-width:150px;text-align:center;"><div style="font-size:36px;color:#E82337;">${users.length}</div><div style="font-size:14px;color:#888;">用户总数</div></div>
        <div class="card" style="flex:1;min-width:150px;text-align:center;"><div style="font-size:36px;color:#E82337;">${vehs.length}</div><div style="font-size:14px;color:#888;">车辆总数</div></div>
        <div class="card" style="flex:1;min-width:150px;text-align:center;"><div style="font-size:36px;color:#E82337;">${grps.length}</div><div style="font-size:14px;color:#888;">分组数</div></div>
      </div>
      <div class="card"><h3 style="margin-bottom:12px;">快速操作</h3>
        ${hasPerm('user.view')?'<button class="btn btn-primary" onclick="switchPage(\'users\')">👥 用户管理</button>':''}
        ${hasPerm('vehicle.view')?'<button class="btn btn-primary" style="margin-left:8px;" onclick="switchPage(\'vehicles\')">🚙 车辆管理</button>':''}
        ${hasPerm('inspection.view')?'<button class="btn btn-primary" style="margin-left:8px;" onclick="switchPage(\'inspections\')">📋 日检管理</button>':''}
        ${hasPerm('repair.view')?'<button class="btn btn-primary" style="margin-left:8px;" onclick="switchPage(\'repairs\')">🔧 维修管理</button>':''}
      </div>`;
  } catch(e) { el.innerHTML = `<div class="card"><p>加载失败: ${e.message}</p></div>`; }
}

// ====== 用户管理 ======
function page_users(el) {
  var toolbarBtns = '';
  if(hasPerm('user.create')) toolbarBtns += '<button class="btn btn-primary" onclick="showUserForm()">+ 添加用户</button>';
  if(hasPerm('user.import')) toolbarBtns += '<button class="btn btn-secondary" onclick="showUserImport()">📥 批量导入</button>';
  if(hasPerm('user.import')) toolbarBtns += '<button class="btn btn-secondary" onclick="downloadTemplate(\'users\')">📄 下载模板</button>';
  el.innerHTML = `<div class="page-title">👥 用户管理</div>
    <div class="toolbar">${toolbarBtns}</div>
    <div class="card" id="user-table-wrap"><p>加载中...</p></div>`;
  loadUsers();
}
async function loadUsers() {
  try {
    const list = await api('GET','/api/users');
    const groups = await api('GET','/api/groups');
    if (!list) return;
    const gmap = {}; (groups||[]).forEach(g => gmap[g.id] = g.name);
    document.getElementById('user-table-wrap').innerHTML = `<table><tr><th>用户名</th><th>姓名</th><th>角色</th><th>分组</th><th>手机</th><th>状态</th><th>操作</th></tr>
      ${list.map(u => `<tr><td>${u.username}</td><td>${u.name}</td><td><span class="tag tag-${u.role}">${roleName(u.role)}</span></td><td>${gmap[u.group_id]||'-'}</td><td>${u.phone||'-'}</td><td>${u.is_active?'<span style="color:#81C784;">正常</span>':'<span style="color:#EF9A9A;">禁用</span>'}</td>
        <td>${hasPerm('user.edit')?'<button class="btn btn-sm btn-secondary" onclick="showEditUser('+u.id+',\''+u.username+'\',\''+u.name+'\',\''+u.role+'\',\''+(u.phone||'')+'\','+(u.group_id||null)+','+(u.role_id||null)+')">编辑</button>':''}
        ${hasPerm('user.delete')?'<button class="btn btn-sm btn-danger" onclick="deleteUser('+u.id+')">删除</button>':''}</td></tr>`).join('')}</table>`;
  } catch(e) { toast('加载失败: ' + e.message, true); }
}
async function showUserForm(data) {
  const groups = await api('GET','/api/groups') || [];
  const roles = await api('GET','/api/roles/simple') || [];
  const html = `<div class="modal-overlay"><div class="modal-content"><h3>${data?'编辑用户':'添加用户'}</h3>
    <div class="form-group"><label>用户名</label><input id="f-username" value="${data?.username||''}" ${data?'disabled':''} /></div>
    <div class="form-group"><label>姓名</label><input id="f-name" value="${data?.name||''}" /></div>
    <div class="form-group"><label>密码${data?'（留空不修改）':''}</label><input id="f-pass" value="${data?'':'123456'}" /></div>
    <div class="row"><div class="form-group"><label>角色（旧）</label><select id="f-role">${['driver','fleet_manager','repair_shop','admin'].map(r => `<option value="${r}" ${data?.role===r?'selected':''}>${roleName(r)}</option>`).join('')}</select></div>
    <div class="form-group"><label>新角色</label><select id="f-role-id"><option value="">-- 选择角色 --</option>${roles.map(r => `<option value="${r.id}" ${data?.role_id===r.id?'selected':''}>${r.display_name||r.name}</option>`).join('')}</select></div>
    <div class="form-group"><label>分组</label><select id="f-group"><option value="">无</option>${groups.map(g => `<option value="${g.id}" ${data?.group_id===g.id?'selected':''}>${g.name}</option>`).join('')}</select></div></div>
    <div class="form-group"><label>手机</label><input id="f-phone" value="${data?.phone||''}" /></div>
    <div style="text-align:right;margin-top:16px;"><button class="btn btn-secondary" onclick="closeOverlay()">取消</button>
    <button class="btn btn-primary" onclick="${data?'doEditUser('+data.id+')':'doAddUser()'}" style="margin-left:8px;">保存</button></div></div></div>`;
  const div = document.createElement('div'); div.innerHTML = html; document.body.appendChild(div.firstElementChild);
}
function showEditUser(id,username,name,role,phone,group_id,role_id) { showUserForm({id,username,name,role,phone,group_id,role_id}); }
async function doAddUser() {
  const rid=document.getElementById('f-role-id').value;
  const data = { username:document.getElementById('f-username').value, name:document.getElementById('f-name').value, password:document.getElementById('f-pass').value||'123456', role:document.getElementById('f-role').value, role_id:rid?parseInt(rid):null, group_id:parseInt(document.getElementById('f-group').value)||null, phone:document.getElementById('f-phone').value };
  if (!data.username||!data.name) { toast('用户名和姓名为必填',true); return; }
  try { await api('POST','/api/users',data); closeOverlay(); toast('添加成功'); loadUsers(); } catch(e) { toast('添加失败: '+e.message,true); }
}
async function doEditUser(id) {
  const rid=document.getElementById('f-role-id').value;
  const data = { name:document.getElementById('f-name').value, password:document.getElementById('f-pass').value, role:document.getElementById('f-role').value, role_id:rid?parseInt(rid):null, group_id:parseInt(document.getElementById('f-group').value)||null, phone:document.getElementById('f-phone').value };
  try { await api('PUT','/api/users/'+id,data); closeOverlay(); toast('已更新'); loadUsers(); } catch(e) { toast('更新失败: '+e.message,true); }
}
async function deleteUser(id) { if(!confirm('确定删除？')) return; try { await api('DELETE','/api/users/'+id); toast('已删除'); loadUsers(); } catch(e) { toast('删除失败: '+e.message,true); } }
async function showUserImport() {
  const html = `<div class="modal-overlay"><div class="modal-content" style="max-width:480px;"><h3>📥 批量导入用户</h3>
    <div style="margin-bottom:12px;">
      <p style="color:#888;font-size:13px;margin-bottom:8px;"><strong>方式一：Excel 导入</strong>（推荐，含示例数据）</p>
      <div class="form-group"><label>选择文件</label><input id="import-user-file" type="file" accept=".xlsx" /></div>
      <div style="margin-top:8px;">
        <button class="btn btn-secondary" onclick="downloadTemplate('users')">📄 下载模板</button>
        <button class="btn btn-primary" onclick="doImportUsersXlsx()" style="margin-left:8px;">📤 上传导入</button>
      </div>
    </div>
    <div style="border-top:1px solid #2A2A3E;padding-top:12px;">
      <p style="color:#888;font-size:13px;margin-bottom:8px;"><strong>方式二：文本粘贴</strong></p>
      <p style="color:#888;font-size:13px;margin-bottom:8px;">格式：用户名,姓名,密码,角色,分组名,手机号</p>
      <div class="form-group"><textarea id="import-user-text" rows="5" placeholder="zhangsan,张三,123456,driver,第一车队,13800138001&#10;lisi,李四,123456,repair_shop,,13800138002"></textarea></div>
      <div style="text-align:right;"><button class="btn btn-primary" onclick="doImportUsers()">导入</button></div>
    </div>
    <div style="text-align:right;margin-top:12px;"><button class="btn btn-secondary" onclick="closeOverlay()">取消</button></div></div></div>`;
  const div = document.createElement('div'); div.innerHTML = html; document.body.appendChild(div.firstElementChild);
}
async function doImportUsers() {
  const text = document.getElementById('import-user-text').value.trim();
  if (!text) { toast('请输入用户数据',true); return; }
  const items = text.split('\n').filter(l=>l.trim()).map(line => { const p = line.split(/[,\t]/).map(s=>s.trim()); return { username:p[0]||'', name:p[1]||p[0]||'', password:p[2]||'123456', role:p[3]||'driver', group_name:p[4]||'', phone:p[5]||'' }; });
  try { const r = await api('POST','/api/users/import',items); closeOverlay(); toast(`导入完成：成功 ${r.imported} 条，跳过 ${r.skipped} 条`); loadUsers(); } catch(e) { toast('导入失败: '+e.message,true); }
}
async function doImportUsersXlsx() {

function buildTree(groups, parentId, depth){
  var h='';
  for(var i=0;i<groups.length;i++){
    var g=groups[i];
    if(g.parent_id!==parentId) continue;
    var indent='';
    for(var d=0;d<depth;d++) indent+='　　';
    var ops = '';
    if(hasPerm('group.create')) ops += '<button class="btn btn-sm btn-secondary" onclick="showGroupForm('+g.id+',\''+esc(g.name)+'\',\''+esc(g.desc||'')+'\','+(g.parent_id||'')+')">编辑</button>';
    if(hasPerm('group.delete')) ops += '<button class="btn btn-sm btn-danger" onclick="deleteGroup('+g.id+')">删除</button>';
    h+='<tr><td>'+g.id+'</td><td style="padding-left:'+(8+depth*24)+'px;">'+(depth>0?'└ ':'')+'<strong>'+esc(g.name)+'</strong></td><td>'+esc(g.desc||'-')+'</td><td>'+g.member_count+'人</td><td>'+ops+'</td></tr>';
    h+=buildTree(groups, g.id, depth+1);
  }
  return h;
}

async function loadInspections(page) {
  try {
    if (page) window.inspPage = page;
    const v = document.getElementById('insp-v')?.value || '';
    const sd = document.getElementById('insp-sd')?.value || '';
    const ed = document.getElementById('insp-ed')?.value || '';
    const q = { page: window.inspPage||1, size: 20 };
    if (v) q.vehicle_id = v; if (sd) q.start_date = sd; if (ed) q.end_date = ed;
    const r = await api('GET', '/api/inspections?' + new URLSearchParams(q).toString());
    if (!r) return;
    const { items, total, page: cp, size: sz } = r;
    const totalPages = Math.ceil(total / sz);
    document.getElementById('insp-table-wrap').innerHTML = `
      <table><tr><th>日期</th><th>车牌号</th><th>驾驶员</th><th>里程数</th><th>上次里程</th><th>里程差</th><th>超阈值</th><th>问题</th></tr>

      <div class="pagination"><button class="btn btn-sm btn-secondary" onclick="loadInspections(1)" ${cp<=1?'disabled':''}>首页</button>
      <button class="btn btn-sm btn-secondary" onclick="loadInspections(${cp+1})" ${cp>=totalPages?'disabled':''}>下一页</button>
      <button class="btn btn-sm btn-secondary" onclick="loadInspections(${totalPages})" ${cp>=totalPages?'disabled':''}>末页</button></div>`;
  } catch(e) { toast('加载失败: '+e.message,true); }
}

async function submitInspFormPage() {
  var vid = parseInt(document.getElementById('insp-form-vid').value);
  if(!vid) return toast('请选择车辆', true);
  var odo = parseInt(document.getElementById('insp-form-odo').value);
  if(!odo || odo <= 0) return toast('请输入里程数', true);
  var issues = document.getElementById('insp-form-issues').value.trim() || '';

  // 上传照片
  var extPhotos = '[]', cabPhotos = '[]', odoPhoto = '';
  try {
    if(document.getElementById('insp-form-ext-file').files.length > 0)
      extPhotos = await uploadFiles('insp-form-ext-file');
    if(document.getElementById('insp-form-cab-file').files.length > 0)
      cabPhotos = await uploadFiles('insp-form-cab-file');
    if(document.getElementById('insp-form-odo-file').files.length > 0) {
      var fd = new FormData(); fd.append('file', document.getElementById('insp-form-odo-file').files[0]);
      var r = await fetch(BASE + '/api/inspections/upload', { method:'POST', headers:{'Authorization':'Bearer '+TOKEN}, body:fd });
      var d = await r.json();
      odoPhoto = d.url || '';
    }
  } catch(e) { /* 照片上传失败不影响提交 */ }

  try {
    var body = new FormData();
    body.append('vehicle_id', vid);
    body.append('manual_odometer', odo);
    body.append('issues', issues);
    body.append('exterior_photos', extPhotos);
    body.append('cabin_photos', cabPhotos);
    body.append('odometer_photo', odoPhoto);
    var r = await fetch(BASE + '/api/inspections', { method:'POST', headers:{'Authorization':'Bearer '+TOKEN}, body:body });
    if(!r.ok) { var e = await r.json(); throw new Error(e.detail || '提交失败'); }
    var result = await r.json();
    toast('✅ 日检提交成功，里程: '+result.odometer_reading+' km' + (result.threshold_exceeded?' ⚠️ 超阈值':''));
    // 成功后跳转到日检列表
    switchPage('inspections');
    loadInspections(1);
  } catch(e) { toast('提交失败: '+e.message, true); }
}

async function ocrInspPhoto() {
  var input = document.getElementById('insp-form-odo-file');
  if(!input || !input.files || !input.files[0]) return toast('请先选择里程表照片',true);
  var file = input.files[0];
  var fd = new FormData(); fd.append('file', file);
  document.getElementById('insp-form-odo-preview').innerHTML = '⏳ 识别中...';
  try {
    var r = await fetch(BASE + '/api/ocr/recognize', { method:'POST', headers:{'Authorization':'Bearer '+TOKEN}, body:fd });
    var d = await r.json();
    if(d.recognized && d.mileage) {
      document.getElementById('insp-form-odo').value = d.mileage;
      document.getElementById('insp-form-odo-preview').innerHTML = '<span style="color:#81C784;">✅ 识别到 <b>'+d.mileage+'</b> 公里，可手动修正</span>';
    } else {
      document.getElementById('insp-form-odo-preview').innerHTML = '<span style="color:#EF9A9A;">❌ 未识别出里程数，请手动输入</span>';
    }
  } catch(e) {
    document.getElementById('insp-form-odo-preview').innerHTML = '<span style="color:#EF9A9A;">请求失败: '+e.message+'</span>';
  }
}
async function submitInspForm() {
  var vid = parseInt(document.getElementById('insp-form-vid').value);
  if(!vid) return toast('请选择车辆', true);
  var odo = parseInt(document.getElementById('insp-form-odo').value);
  if(!odo || odo <= 0) return toast('请输入里程数', true);
  var issues = document.getElementById('insp-form-issues').value.trim() || '';

  // 上传照片
  document.querySelector('.modal-content h3').textContent = '⏳ 上传照片中...';
  var extPhotos = '[]', cabPhotos = '[]', odoPhoto = '';
  try {
    if(document.getElementById('insp-form-ext-file').files.length > 0)
      extPhotos = await uploadFiles('insp-form-ext-file');
    if(document.getElementById('insp-form-cab-file').files.length > 0)
      cabPhotos = await uploadFiles('insp-form-cab-file');
    if(document.getElementById('insp-form-odo-file').files.length > 0) {
      var fd = new FormData(); fd.append('file', document.getElementById('insp-form-odo-file').files[0]);
      var r = await fetch(BASE + '/api/inspections/upload', { method:'POST', headers:{'Authorization':'Bearer '+TOKEN}, body:fd });
      var d = await r.json();
      odoPhoto = d.url || '';
    }
  } catch(e) { /* 照片上传失败不影响提交 */ }

  document.querySelector('.modal-content h3').textContent = '⏳ 提交中...';
  try {
    var body = new FormData();
    body.append('vehicle_id', vid);
    body.append('manual_odometer', odo);
    body.append('issues', issues);
    body.append('exterior_photos', extPhotos);
    body.append('cabin_photos', cabPhotos);
    body.append('odometer_photo', odoPhoto);
    var r = await fetch(BASE + '/api/inspections', { method:'POST', headers:{'Authorization':'Bearer '+TOKEN}, body:body });
    if(!r.ok) { var e = await r.json(); throw new Error(e.detail || '提交失败'); }
    var result = await r.json();
    toast('✅ 日检提交成功，里程: '+result.odometer_reading+' km' + (result.threshold_exceeded?' ⚠️ 超阈值':''));
    closeOverlay();
    loadInspections(1);
  } catch(e) { toast('提交失败: '+e.message, true); document.querySelector('.modal-content h3').textContent = '📋 新建日检'; }
}

async function loadRepairs(page) {

    var {items, total, page:cp, size:sz} = r;
    var totalPages = Math.ceil(total / sz);
    var h = '<table><tr><th>ID</th><th>车牌号</th><th>修理厂</th><th>描述</th><th>状态</th><th>创建时间</th><th>操作</th></tr>';
    for(var i=0;i<items.length;i++) {

      var actions = '';

      if(st2 === 'dispatched' && hasPerm('repair.accept')) actions += '<button class="btn btn-sm btn-primary" onclick="acceptFromRepairs('+o.id+')">接单</button>';
      if(st2 === 'completed' && hasPerm('repair.verify')) actions += '<button class="btn btn-sm btn-success" onclick="showVerifyForm('+o.id+')">验收</button>';
      if(hasPerm('repair.view')) actions += '<button class="btn btn-sm btn-secondary" onclick="showRepairDetail('+o.id+')">详情</button>';
      h += '<tr><td>'+o.id+'</td><td><strong>'+esc(o.plate_number)+'</strong></td><td>'+esc(o.shop_name||'-')+'</td><td>'+esc(o.description||'').substring(0,30)+'</td><td>'+statusText2(o.status)+'</td><td style="font-size:13px;">'+(o.created_at||'').substring(0,19)+'</td><td>'+actions+'</td></tr>';
    }

    h += '<div class="pagination"><button class="btn btn-sm btn-secondary" onclick="loadRepairs(1)" '+(cp<=1?'disabled':'')+'>首页</button><button class="btn btn-sm btn-secondary" onclick="loadRepairs('+(cp+1)+')" '+(cp>=totalPages?'disabled':'')+'>下一页</button><button class="btn btn-sm btn-secondary" onclick="loadRepairs('+totalPages+')" '+(cp>=totalPages?'disabled':'')+'>末页</button></div>';
    document.getElementById('rep-table-wrap').innerHTML = h;
  } catch(e) { document.getElementById('rep-table-wrap').innerHTML = '<p style="text-align:center;padding:20px;color:#EF9A9A;">加载失败: '+e.message+'</p>'; }

    })}else{h+='<tr><td colspan="4" style="text-align:center;padding:20px;color:#555;">暂无待接单</td></tr>'}
    h+='</table>';

    var h2='<table><tr><th>车牌号</th><th>状态</th><th>描述</th><th>操作</th></tr>';

      var actions='';
      if((st==='accepted'||st==='step_3')&&hasPerm('repair.detail_upload')) actions='<button class="btn btn-sm btn-secondary" onclick="showRepairDetail('+o.id+')">上传明细</button>';
      else if((st==='in_progress'||st==='step_4')&&hasPerm('repair.complete')) actions='<button class="btn btn-sm btn-success" onclick="completeFromWorkbench('+o.id+')">完成维修</button>';
      h2+='<tr><td>'+esc(o.plate_number)+'</td><td>'+statusText2(o.status)+'</td><td>'+esc(o.description||'').substring(0,30)+'</td><td>'+actions+'</td></tr>';
    })}else{h2+='<tr><td colspan="4" style="text-align:center;padding:20px;color:#555;">暂无进行中的维修</td></tr>'}
    h2+='</table>';
    document.getElementById('wk-active').innerHTML=h2;
  }).catch(function(e){document.getElementById('wk-pending').innerHTML='<p style="text-align:center;padding:20px;color:#EF9A9A;">加载失败: '+e.message+'</p>'});
}
function acceptFromWorkbench(oid){
  api('PUT','/api/repairs/'+oid+'/accept',{accept_photos:'[]'}).then(function(){loadWorkbench();toast('已接单')}).catch(function(e){toast('接单失败: '+e.message,true)});
}
function completeFromWorkbench(oid){
  api('PUT','/api/repairs/'+oid+'/complete').then(function(){loadWorkbench();toast('已标记完成')}).catch(function(e){toast('标记失败: '+e.message,true)});
}

// ====== 系统设置 ======
async function page_settings(el) {
  el.innerHTML = `<div class="page-title">⚙️ 系统设置</div><div class="card"><p>加载中...</p></div>`;
  try {
    const s = await api('GET','/api/settings') || {};
    var sets = s.settings || s;
    var siteTitle = sets.SITE_TITLE || '车辆管理系统';
    var ocrOn = sets.OCR_ENABLED === 'true' || sets.OCR_ENABLED === true;
    var dataDir = sets.DATA_DIR || sets.UPLOAD_DIR || '-';
    var port = sets.PORT || '8700';
    var thr = sets.MILEAGE_THRESHOLD || '5000';
    el.innerHTML = `<div class="page-title">⚙️ 系统设置</div>
      <div class="card">
        <div class="form-group"><label>网站标题</label>
          <div style="display:flex;gap:8px;"><input id="set-title" value="${siteTitle}" style="flex:1;" /><button class="btn btn-primary btn-sm" onclick="saveSiteTitle()">保存</button></div></div>
        <div class="form-group"><label>OCR 里程识别</label>
          <select id="set-ocr"><option value="true" ${ocrOn?'selected':''}>开启</option><option value="false" ${!ocrOn?'selected':''}>关闭</option></select>
          <button class="btn btn-primary btn-sm" style="margin-top:4px;" onclick="saveOcrSetting()">保存</button></div>
        <div class="form-group"><label>数据目录</label><input value="${dataDir}" disabled /></div>
        <div class="row"><div class="form-group"><label>监听端口</label><input value="${port}" disabled /></div>
        <div class="form-group"><label>里程阈值(公里)</label>
          <div style="display:flex;gap:8px;"><input id="set-mileage-threshold" value="${thr}" style="flex:1;" type="number" min="0" max="999999" /><button class="btn btn-primary btn-sm" onclick="saveMileageThreshold()">保存</button></div></div></div>
        <div style="margin-top:12px;color:#888;font-size:13px;"><p>⚠️ 部分配置需重启应用生效。</p></div>
      </div>
      <div class="card"><h3>🖼️ OCR 测试</h3>
        <p style="color:#888;font-size:13px;margin-bottom:8px;">上传里程表照片，测试识别效果</p>
        <input type="file" id="ocr-test-file" accept="image/*" style="width:auto;" onchange="ocrTest()" />
        <div id="ocr-test-result" style="margin-top:8px;font-size:14px;"></div>
      </div>
      <!-- 全量备份 -->
      <div class="card" style="margin-top:16px;">
        <h4 style="margin-top:0;">⏰ 自动备份（全量）</h4>
        <p style="color:#888;font-size:12px;">备份整个数据库+照片，文件名为 <code>auto-backup-时间.tar.gz</code>，导入前自动预备份。</p>
        <div class="row">
          <div class="form-group"><label>备份目录</label><input id="s-bak-dir" value="${sets.BACKUP_DIR || '/vol2/1000/AI/车辆管理-备份'}" style="width:280px;" placeholder="填写完整路径" /></div>
        </div>
        <div class="row">
          <div class="form-group"><label>间隔(小时)</label><input id="s-bak-interval" value="${sets.BACKUP_INTERVAL_HOURS || '24'}" style="width:80px;" /></div>
          <div class="form-group"><label>保留(个)</label><input id="s-bak-retention" value="${sets.BACKUP_RETENTION || '7'}" style="width:80px;" /></div>
          <div style="display:flex;align-items:flex-end;padding-bottom:4px;">
            <button class="btn btn-secondary" onclick="saveBackupSettings()" style="font-size:12px;">💾 保存</button>
          </div>
        </div>
        <div id="backup-files" style="margin-top:8px;"></div>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="doBackup()">📥 下载备份</button>
          <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📤 导入备份</button>
          <input type="file" id="import-file" accept=".tar.gz,.tgz" style="display:none" onchange="doImportBackup(this)" />
          <button class="btn btn-secondary" onclick="doAutoFullBackup()">🔄 立即执行</button>
        </div>
        <div id="backup-status" style="margin-top:8px;font-size:13px;"></div>
      </div>
      <!-- 增量备份 -->
      <div class="card" style="margin-top:16px;">
        <h4 style="margin-top:0;">📦 定期增量备份</h4>
        <p style="color:#888;font-size:12px;">按时间范围导出业务数据（不含照片），导入冲突自动保留最新。</p>
        <div class="row">
          <div class="form-group"><label>启用</label>
            <select id="s-reg-enabled" style="width:80px;"><option value="true" ${sets.REGULAR_BACKUP_ENABLED !== 'false' ? 'selected' : ''}>是</option>
            <option value="false" ${sets.REGULAR_BACKUP_ENABLED === 'false' ? 'selected' : ''}>否</option></select>
          </div>
          <div class="form-group"><label>间隔(小时)</label><input id="s-reg-interval" value="${sets.REGULAR_BACKUP_INTERVAL_HOURS || '168'}" style="width:80px;" title="默认 168h=7天" /></div>
          <div class="form-group"><label>每次备份(N天内)</label><input id="s-reg-days" value="${sets.REGULAR_BACKUP_DAYS || '30'}" style="width:80px;" /></div>
          <div style="display:flex;align-items:flex-end;padding-bottom:4px;">
            <button class="btn btn-secondary" onclick="saveRegBackupSettings()" style="font-size:12px;">💾 保存</button>
          </div>
        </div>
        <div id="reg-backup-files" style="margin-top:8px;"></div>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="doRegBackup()">📥 导出增量</button>
          <button class="btn btn-secondary" onclick="document.getElementById('import-reg-file').click()">📤 导入增量</button>
          <input type="file" id="import-reg-file" accept=".tar.gz,.tgz" style="display:none" onchange="doRegImportBackup(this)" />
        </div>
        <div id="reg-backup-status" style="margin-top:6px;font-size:13px;"></div>
      </div>`;
    setTimeout(function(){ loadBackupFiles(); }, 200);
  } catch(e) { el.innerHTML = `<div class="page-title">⚙️ 系统设置</div><div class="card"><p>加载失败: ${e.message}</p></div>`; }
}
async function saveSiteTitle() {
  var v = document.getElementById('set-title')?.value;
  if(!v) return toast('请输入标题',true);
  try {
    var r = await api('PUT','/api/settings',{key:'SITE_TITLE',value:v});
    if(r) { document.title = v; var t=document.getElementById('page-title'); if(t) t.textContent=v; toast('网站标题已更新'); }
  } catch(e) { toast('保存失败: '+e.message,true); }
}
async function saveOcrSetting() {
  var v = document.getElementById('set-ocr')?.value;
  try {
    var r = await api('PUT','/api/settings',{key:'OCR_ENABLED',value:v});
    if(r) toast('OCR 设置已更新，重启应用后生效');
  } catch(e) { toast('保存失败: '+e.message,true); }
}
async function saveMileageThreshold() {
  var v = document.getElementById('set-mileage-threshold')?.value;
  if(!v || isNaN(v)) return toast('请输入有效数字',true);
  try {
    var r = await api('PUT','/api/settings',{key:'MILEAGE_THRESHOLD',value:v});
    if(r) toast('里程阈值已更新，重启应用后生效');
  } catch(e) { toast('保存失败: '+e.message,true); }
}
async function ocrTest() {
  var f = document.getElementById('ocr-test-file');
  if(!f || !f.files || !f.files[0]) return;
  var file = f.files[0];
  var fd = new FormData();
  fd.append('file', file);
  document.getElementById('ocr-test-result').innerHTML = '<span style="color:#888;">识别中...</span>';
  try {
    var r = await fetch(BASE + '/api/ocr/recognize', { method:'POST', headers:{'Authorization':'Bearer '+TOKEN}, body:fd });
    var d = await r.json();
    if(d.recognized) {
      document.getElementById('ocr-test-result').innerHTML = '<span style="color:#81C784;font-size:18px;font-weight:bold;">✅ 识别结果: ' + d.mileage + ' 公里</span>';
    } else {
      document.getElementById('ocr-test-result').innerHTML = '<span style="color:#EF9A9A;">❌ 未识别出有效里程，请换一张照片试试</span>';
    }
  } catch(e) { document.getElementById('ocr-test-result').innerHTML = '<span style="color:#EF9A9A;">请求失败: '+e.message+'</span>'; }
}
// ========== 备份功能 ==========
async function saveBackupSettings() {
  try {
    await api('PUT','/api/settings',{key:'BACKUP_DIR',value:document.getElementById('s-bak-dir').value});
    await api('PUT','/api/settings',{key:'BACKUP_INTERVAL_HOURS',value:document.getElementById('s-bak-interval').value});
    await api('PUT','/api/settings',{key:'BACKUP_RETENTION',value:document.getElementById('s-bak-retention').value});
    toast('备份设置已保存，重启后生效');
  } catch(e) { toast('保存失败: '+e.message,true); }
}
async function saveRegBackupSettings() {
  try {
    await api('PUT','/api/settings',{key:'REGULAR_BACKUP_ENABLED',value:document.getElementById('s-reg-enabled').value});
    await api('PUT','/api/settings',{key:'REGULAR_BACKUP_INTERVAL_HOURS',value:document.getElementById('s-reg-interval').value});
    await api('PUT','/api/settings',{key:'REGULAR_BACKUP_DAYS',value:document.getElementById('s-reg-days').value});
    toast('增量备份设置已保存，重启后生效');
  } catch(e) { toast('保存失败: '+e.message,true); }
}
async function loadBackupFiles() {
  try {
    var d = await api('GET','/api/backup/list');
    if(!d) return;
    var files = d.backups || [];
    var el = document.getElementById('backup-files');
    if(!el) return;
    if(files.length===0) { el.innerHTML='<p style="color:#555;font-size:12px;">暂无备份文件</p>'; return; }
    var h='<table><tr><th>文件名</th><th>大小</th><th>操作</th></tr>';
    for(var i=0;i<files.length;i++){
      var f=files[i];
      var sz = f.size ? (f.size/1024/1024).toFixed(1)+' MB' : '-';
      h+='<tr><td>'+f.name+'</td><td>'+sz+'</td><td><button class="btn btn-sm btn-primary" onclick="downloadBackup(\''+f.name+'\')">📥</button> <button class="btn btn-sm btn-danger" onclick="deleteBackup(\''+f.name+'\')">🗑️</button></td></tr>';
    }
    h+='</table>';
    el.innerHTML = h;
  } catch(e) {}
}
async function downloadBackup(name) {
  window.open(BASE+'/api/backup/download/'+encodeURIComponent(name));
}
async function deleteBackup(name) {
  if(!confirm('确认删除 '+name+'?')) return;
  try {
    await api('DELETE','/api/backup/'+encodeURIComponent(name));
    toast('已删除');
    loadBackupFiles();
  } catch(e) { toast('删除失败: '+e.message,true); }
}
async function doBackup() {
  var btn = event.target;
  btn.disabled = true;
  document.getElementById('backup-status').innerHTML = '<span style="color:#888;">备份中...</span>';
  try {
    var d = await api('POST','/api/backup/create');
    if(d && d.path) toast('备份完成: '+d.path.split('/').pop());
    else toast('备份完成');
    loadBackupFiles();
    document.getElementById('backup-status').innerHTML = '';
  } catch(e) { document.getElementById('backup-status').innerHTML = '<span style="color:#EF9A9A;">失败: '+e.message+'</span>'; }
  btn.disabled = false;
}
async function doAutoFullBackup() {
  var btn = event.target;
  btn.disabled = true;
  document.getElementById('backup-status').innerHTML = '<span style="color:#888;">执行中...</span>';
  try {
    var d = await api('POST','/api/backup/trigger-auto');
    if(d && d.path) toast('自动备份完成: '+d.path.split('/').pop());
    else toast('自动备份已触发');
    loadBackupFiles();
    document.getElementById('backup-status').innerHTML = '';
  } catch(e) { document.getElementById('backup-status').innerHTML = '<span style="color:#EF9A9A;">失败: '+e.message+'</span>'; }
  btn.disabled = false;
}
async function doImportBackup(input) {
  if(!input || !input.files || !input.files[0]) return;
  var file = input.files[0];
  if(!confirm('导入前将自动创建当前备份。确定导入 '+file.name+' 吗?')) return;
  var fd = new FormData();
  fd.append('file',file);
  document.getElementById('backup-status').innerHTML = '<span style="color:#888;">导入中...</span>';
  try {
    var d = await fetch(BASE+'/api/backup/import',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN},body:fd});
    var r = await d.json();
    if(d.ok) { toast('导入成功'); loadBackupFiles(); }
    else throw new Error(r.detail||'导入失败');
    document.getElementById('backup-status').innerHTML = '';
  } catch(e) { document.getElementById('backup-status').innerHTML = '<span style="color:#EF9A9A;">失败: '+e.message+'</span>'; }
  input.value='';
}
async function doRegBackup() {
  var days = document.getElementById('s-reg-days')?.value || 30;
  document.getElementById('reg-backup-status').innerHTML = '<span style="color:#888;">导出中...</span>';
  try {
    var d = await api('POST','/api/regular-backup/export?days='+days);
    if(d && d.path) toast('增量备份完成: '+d.path.split('/').pop());
    document.getElementById('reg-backup-status').innerHTML = '';
  } catch(e) { document.getElementById('reg-backup-status').innerHTML = '<span style="color:#EF9A9A;">失败: '+e.message+'</span>'; }
}
async function doRegImportBackup(input) {
  if(!input || !input.files || !input.files[0]) return;
  var file = input.files[0];
  var fd = new FormData();
  fd.append('file',file);
  document.getElementById('reg-backup-status').innerHTML = '<span style="color:#888;">导入中...</span>';
  try {
    var d = await fetch(BASE+'/api/regular-backup/import',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN},body:fd});
    var r = await d.json();
    if(d.ok) toast('增量导入成功');
    else throw new Error(r.detail||'导入失败');
    document.getElementById('reg-backup-status').innerHTML = '';
  } catch(e) { document.getElementById('reg-backup-status').innerHTML = '<span style="color:#EF9A9A;">失败: '+e.message+'</span>'; }
  input.value='';
}
</script></body></html>
