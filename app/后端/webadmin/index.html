<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>车辆管理系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #0F0F19; color: #E0E0E0; min-height: 100vh; display: flex; }
.sidebar { width: 200px; background: #1A1A2E; padding: 20px 0; flex-shrink: 0; }
.sidebar h2 { padding: 0 20px 20px; color: #E82337; font-size: 18px; border-bottom: 1px solid #2A2A3E; }
.sidebar a { display: block; padding: 12px 20px; color: #888; text-decoration: none; cursor: pointer; }
.sidebar a:hover, .sidebar a.active { color: #fff; background: #2A2A3E; }
.main { flex: 1; padding: 24px; overflow-y: auto; max-height: 100vh; }
.card { background: #1A1A2E; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #2A2A3E; font-size: 14px; }
th { color: #888; font-weight: normal; }
tr:hover { background: #2A2A3E; }
.btn { display: inline-block; padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; margin: 2px; }
.btn-primary { background: #E82337; color: #fff; }
.btn-secondary { background: #2A2A3E; color: #E0E0E0; border: 1px solid #3A3A50; }
.btn-danger { background: #B71C1C; color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
input, select { background: #2A2A3E; border: 1px solid #3A3A50; color: #E0E0E0; padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
input:focus { outline: none; border-color: #E82337; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
.page-title { font-size: 22px; font-weight: bold; margin-bottom: 16px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.tag-admin { background: #1A237E; color: #7986CB; }
.tag-fleet_manager { background: #004466; color: #4FC3F7; }
.tag-repair_shop { background: #334400; color: #8BC34A; }
.tag-driver { background: #665500; color: #FFD700; }
.hidden { display: none !important; }
.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal-content { background: #1A1A2E; border-radius: 12px; padding: 24px; width: 420px; max-width: 90vw; }
.modal-content h3 { margin-bottom: 16px; }
.toast { position: fixed; top: 20px; right: 20px; background: #1B5E20; color: #fff; padding: 12px 20px; border-radius: 8px; z-index: 200; font-size: 14px; }
.toast.error { background: #B71C1C; }
.menu-toggle { display: none; }
.sidebar-overlay { display: none; }
.row { display: flex; gap: 12px; }
.row > * { flex: 1; }
/* 在窄屏下 sidebar 通过抽屉显示 */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .menu-toggle { display: block !important; }
}
body.menu-open .sidebar { display: block; position: fixed; top: 0; left: 0; width: 260px; height: 100%; z-index: 1000; overflow-y: auto; }
body.menu-open .sidebar-overlay { display: block; }
</style>
</head>
<body>

<!-- 登录页 -->
<div id="page-login" style="width:100%;display:flex;align-items:center;justify-content:center;">
  <div class="card" style="width:360px;padding:40px;">
    <h2 style="text-align:center;color:#E82337;margin-bottom:24px;">🚗 车辆管理系统</h2>
    <div class="form-group">
      <label>用户名</label>
      <input id="login-user" value="admin" />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input id="login-pass" type="password" value="admin123" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn btn-primary" style="width:100%;padding:10px;font-size:15px;margin-top:8px;" onclick="login()">登录</button>
    <p style="text-align:center;color:#555;font-size:12px;margin-top:16px;">默认账号: admin / admin123</p>
  </div>
</div>

<!-- 主界面 -->
<div id="page-main" class="hidden" style="width:100%;display:flex;">
  <div class="sidebar">
    <h2>🚗 车辆管理</h2>
    <a class="active" onclick="switchPage('dashboard',this)">📊 概况</a>
    <a onclick="switchPage('users',this)">👥 用户管理</a>
    <a onclick="switchPage('groups',this)">📁 分组管理</a>
    <a onclick="switchPage('vehicles',this)">🚙 车辆管理</a>
    <a onclick="switchPage('settings',this)">⚙️ 系统设置</a>
    <a onclick="switchPage('logs',this)">📋 操作日志</a>
    <div style="border-top:1px solid #2A2A3E;margin-top:20px;padding-top:20px;">
      <a onclick="logout()">🚪 退出登录</a>
    </div>
  </div>

  <div class="main" id="page-content"></div>
</div>

<button class="menu-toggle" onclick="toggleMenu()" style="display:none;position:fixed;top:12px;left:12px;z-index:1001;background:#E82337;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:18px;cursor:pointer;">☰</button>
<div class="sidebar-overlay" onclick="toggleMenu()" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;"></div>

<script>
// ========== API ==========
const BASE = window.location.origin;
let TOKEN = '';

async function api(method, path, body) {
  const opt = { method, headers: { 'Authorization': 'Bearer ' + TOKEN } };
  if (body) { opt.headers['Content-Type'] = 'application/json'; opt.body = JSON.stringify(body); }
  const r = await fetch(BASE + path, opt);
  if (r.status === 401) { alert('登录过期，请重新登录'); logout(); return null; }
  if (!r.ok) { const d = await r.json().catch(()=>({})); throw new Error(d.detail || r.statusText); }
  return r.json();
}

// ========== 登录 ==========
async function login() {
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  try {
    const d = await api('POST', '/api/auth/login', { username: user, password: pass });
    if (!d) return;
    TOKEN = d.token;
    document.getElementById('page-login').classList.add('hidden');
    document.getElementById('page-main').classList.remove('hidden');
    switchPage('dashboard');
  } catch(e) { alert('登录失败: ' + e.message); }
}

function logout() {
  TOKEN = '';
  document.getElementById('page-login').classList.remove('hidden');
  document.getElementById('page-main').classList.add('hidden');
}

// ========== 侧栏（窄屏抽屉） ==========
function toggleMenu() {
  document.body.classList.toggle('menu-open');
}

// ========== 页面切换 ==========
const pages = { dashboard, users, groups, vehicles, settings };

function switchPage(name, el) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  const content = document.getElementById('page-content');
  if (pages[name]) pages[name](content);
}

// ========== 概况 ==========
async function dashboard(el) {
  el.innerHTML = '<div class="page-title">📊 概况</div><div class="card"><p>加载中...</p></div>';
  try {
    const [users, vehs, grps] = await Promise.all([
      api('GET', '/api/users'),
      api('GET', '/api/vehicles'),
      api('GET', '/api/groups'),
    ]);
    const admin = users.find(u => u.role === 'admin');
    el.innerHTML = `
      <div class="page-title">📊 概况</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <div class="card" style="flex:1;min-width:150px;text-align:center;"><div style="font-size:36px;color:#E82337;">${users.length}</div><div style="font-size:14px;color:#888;">用户总数</div></div>
        <div class="card" style="flex:1;min-width:150px;text-align:center;"><div style="font-size:36px;color:#E82337;">${vehs.length}</div><div style="font-size:14px;color:#888;">车辆总数</div></div>
        <div class="card" style="flex:1;min-width:150px;text-align:center;"><div style="font-size:36px;color:#E82337;">${grps.length}</div><div style="font-size:14px;color:#888;">分组数</div></div>
      </div>
      <div class="card" style="margin-top:16px;">
        <h3 style="margin-bottom:12px;">快速操作</h3>
        <button class="btn btn-primary" onclick="switchPage('users')">👥 管理用户</button>
        <button class="btn btn-primary" style="margin-left:8px;" onclick="switchPage('vehicles')">🚙 管理车辆</button>
        <button class="btn btn-primary" style="margin-left:8px;" onclick="switchPage('groups')">📁 管理分组</button>
        <button class="btn btn-secondary" style="margin-left:8px;" onclick="switchPage('settings')">⚙️ 设置</button>
      </div>
      <div class="card"><h3>管理员信息</h3><p>当前登录: ${admin ? admin.name : 'admin'}</p><p>角色: 管理员</p></div>
    `;
  } catch(e) { el.innerHTML = `<div class="card"><p class="error">加载失败: ${e.message}</p></div>`; }
}

// ========== 用户管理 ==========
async function users(el) {
  const render = () => {
    el.innerHTML = `
      <div class="page-title">👥 用户管理</div>
      <div class="card">
        <button class="btn btn-primary" onclick="showUserForm()">+ 添加用户</button>
      </div>
      <div class="card" id="user-table-wrap"><p>加载中...</p></div>
    `;
    loadUsers();
  };
  el.render = render;
  render();
}

async function loadUsers() {
  try {
    const list = await api('GET', '/api/users');
    const groups = await api('GET', '/api/groups');
    const gmap = {}; groups.forEach(g => gmap[g.id] = g.name);
    const wrap = document.getElementById('user-table-wrap');
    if (!wrap) return;
    wrap.innerHTML = `
      <table>
        <tr><th>用户名</th><th>姓名</th><th>角色</th><th>分组</th><th>手机</th><th>操作</th></tr>
        ${list.map(u => `
          <tr>
            <td>${u.username}</td>
            <td>${u.name}</td>
            <td><span class="tag tag-${u.role}">${roleName(u.role)}</span></td>
            <td>${gmap[u.group_id] || '-'}</td>
            <td>${u.phone || '-'}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">删除</button>
            </td>
          </tr>
        `).join('')}
      </table>
    `;
  } catch(e) { toast('加载失败: ' + e.message, true); }
}

function roleName(r) {
  const map = { admin: '管理员', fleet_manager: '车管员', repair_shop: '汽修厂', driver: '司机' };
  return map[r] || r;
}

async function showUserForm() {
  const groups = await api('GET', '/api/groups');
  const html = `
    <div class="modal" id="user-modal">
      <div class="modal-content">
        <h3>添加用户</h3>
        <div class="form-group"><label>用户名</label><input id="f-username" /></div>
        <div class="form-group"><label>姓名</label><input id="f-name" /></div>
        <div class="form-group"><label>密码</label><input id="f-pass" value="123456" /></div>
        <div class="row">
          <div class="form-group"><label>角色</label><select id="f-role">
            <option value="driver">司机</option>
            <option value="fleet_manager">车管员</option>
            <option value="repair_shop">汽修厂</option>
            <option value="admin">管理员</option>
          </select></div>
          <div class="form-group"><label>分组</label><select id="f-group">
            <option value="">无</option>
            ${groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-group"><label>手机</label><input id="f-phone" /></div>
        <div style="text-align:right;margin-top:16px;">
          <button class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="doAddUser()" style="margin-left:8px;">保存</button>
        </div>
      </div>
    </div>
  `;
  const div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div.firstElementChild);
}

async function doAddUser() {
  const data = {
    username: document.getElementById('f-username').value,
    name: document.getElementById('f-name').value,
    password: document.getElementById('f-pass').value,
    role: document.getElementById('f-role').value,
    group_id: parseInt(document.getElementById('f-group').value) || null,
    phone: document.getElementById('f-phone').value,
  };
  if (!data.username || !data.name) { alert('用户名和姓名为必填'); return; }
  try {
    await api('POST', '/api/users', data);
    closeModal();
    toast('添加成功');
    loadUsers();
  } catch(e) { toast('添加失败: ' + e.message, true); }
}

async function deleteUser(id) {
  if (!confirm('确定删除该用户？此操作不可撤销！')) return;
  try {
    await api('DELETE', '/api/users/' + id);
    toast('已删除');
    loadUsers();
  } catch(e) { toast('删除失败: ' + e.message, true); }
}

function closeModal() {
  const m = document.getElementById('user-modal');
  if (m) m.remove();
}

// ========== 分组管理 ==========
async function groups(el) {
  const render = () => {
    el.innerHTML = `
      <div class="page-title">📁 分组管理</div>
      <div class="card">
        <button class="btn btn-primary" onclick="showGroupForm()">+ 添加分组</button>
      </div>
      <div class="card" id="group-table-wrap"><p>加载中...</p></div>
    `;
    loadGroups();
  };
  el.render = render;
  render();
}

async function loadGroups() {
  try {
    const list = await api('GET', '/api/groups');
    document.getElementById('group-table-wrap').innerHTML = `
      <table>
        <tr><th>ID</th><th>名称</th><th>描述</th><th>成员数</th></tr>
        ${list.map(g => `
          <tr>
            <td>${g.id}</td>
            <td><strong>${g.name}</strong></td>
            <td>${g.desc || '-'}</td>
            <td>${g.member_count || 0}人</td>
          </tr>
        `).join('')}
      </table>
    `;
  } catch(e) { toast('加载失败', true); }
}

function showGroupForm() {
  const html = `
    <div class="modal" id="group-modal">
      <div class="modal-content">
        <h3>添加分组</h3>
        <div class="form-group"><label>名称</label><input id="g-name" /></div>
        <div class="form-group"><label>描述</label><input id="g-desc" /></div>
        <div style="text-align:right;margin-top:16px;">
          <button class="btn btn-secondary" onclick="closeGroupModal()">取消</button>
          <button class="btn btn-primary" onclick="doAddGroup()" style="margin-left:8px;">保存</button>
        </div>
      </div>
    </div>
  `;
  const div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div.firstElementChild);
}

async function doAddGroup() {
  const data = { name: document.getElementById('g-name').value, desc: document.getElementById('g-desc').value };
  if (!data.name) { alert('请输入名称'); return; }
  try {
    await api('POST', '/api/groups', data);
    closeGroupModal();
    toast('添加成功');
    loadGroups();
  } catch(e) { toast('添加失败: ' + e.message, true); }
}

function closeGroupModal() {
  const m = document.getElementById('group-modal');
  if (m) m.remove();
}

// ========== 车辆管理 ==========
async function vehicles(el) {
  const render = () => {
    el.innerHTML = `
      <div class="page-title">🚙 车辆管理</div>
      <div class="card">
        <button class="btn btn-primary" onclick="showVehicleForm()">+ 添加车辆</button>
      </div>
      <div class="card" id="vehicle-table-wrap"><p>加载中...</p></div>
    `;
    loadVehicles();
  };
  el.render = render;
  render();
}

async function loadVehicles() {
  try {
    const list = await api('GET', '/api/vehicles');
    document.getElementById('vehicle-table-wrap').innerHTML = `
      <table>
        <tr><th>车牌号</th><th>品牌</th><th>型号</th><th>颜色</th><th>驾驶员</th><th>状态</th></tr>
        ${list.map(v => `
          <tr>
            <td><strong>${v.plate_number}</strong></td>
            <td>${v.brand || '-'}</td>
            <td>${v.model || '-'}</td>
            <td>${v.color || '-'}</td>
            <td>${v.driver_name || '-'}</td>
            <td>${v.is_active ? '<span style="color:#81C784;">正常</span>' : '<span style="color:#EF9A9A;">停用</span>'}</td>
          </tr>
        `).join('')}
      </table>
    `;
  } catch(e) { toast('加载失败: ' + e.message, true); }
}

async function showVehicleForm() {
  const groups = await api('GET', '/api/groups');
  const users = await api('GET', '/api/users');
  const drivers = users.filter(u => u.role === 'driver');
  const html = `
    <div class="modal" id="vehicle-modal">
      <div class="modal-content">
        <h3>添加车辆</h3>
        <div class="row">
          <div class="form-group"><label>车牌号 *</label><input id="v-plate" /></div>
          <div class="form-group"><label>品牌</label><input id="v-brand" /></div>
        </div>
        <div class="row">
          <div class="form-group"><label>型号</label><input id="v-model" /></div>
          <div class="form-group"><label>颜色</label><input id="v-color" /></div>
        </div>
        <div class="row">
          <div class="form-group"><label>VIN</label><input id="v-vin" /></div>
          <div class="form-group"><label>分组</label><select id="v-group"><option value="">无</option>${groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('')}</select></div>
        </div>
        <div class="form-group"><label>驾驶员</label><select id="v-driver"><option value="">无</option>${drivers.map(d => `<option value="${d.id}">${d.name}</option>`).join('')}</select></div>
        <div style="text-align:right;margin-top:16px;">
          <button class="btn btn-secondary" onclick="closeVehicleModal()">取消</button>
          <button class="btn btn-primary" onclick="doAddVehicle()" style="margin-left:8px;">保存</button>
        </div>
      </div>
    </div>
  `;
  const div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div.firstElementChild);
}

async function doAddVehicle() {
  const data = {
    plate_number: document.getElementById('v-plate').value,
    brand: document.getElementById('v-brand').value,
    model: document.getElementById('v-model').value,
    color: document.getElementById('v-color').value,
    vin: document.getElementById('v-vin').value,
    group_id: parseInt(document.getElementById('v-group').value) || null,
    driver_id: parseInt(document.getElementById('v-driver').value) || null,
  };
  if (!data.plate_number) { alert('请输入车牌号'); return; }
  try {
    await api('POST', '/api/vehicles', data);
    closeVehicleModal();
    toast('添加成功');
    loadVehicles();
  } catch(e) { toast('添加失败: ' + e.message, true); }
}

function closeVehicleModal() {
  const m = document.getElementById('vehicle-modal');
  if (m) m.remove();
}

// ========== 系统设置 ==========
async function settings(el) {
  el.innerHTML = `
    <div class="page-title">⚙️ 系统设置</div>
    <div class="card"><p>加载中...</p></div>
  `;
  try {
    const d = await api('GET', '/api/settings');
    const s = d.settings || {};
    el.innerHTML = `
      <div class="page-title">⚙️ 系统设置</div>
      <div class="card">
        <p style="color:#888;font-size:13px;margin-bottom:12px;">配置文件: ${d.env_file_path}</p>
        <div class="form-group"><label>数据存储目录</label><input id="s-data_dir" value="${s.DATA_DIR || ''}" /></div>
        <div class="row">
          <div class="form-group"><label>服务端口</label><input id="s-port" value="${s.PORT || '8700'}" /></div>
          <div class="form-group"><label>里程预警阈值(km)</label><input id="s-threshold" value="${s.MILEAGE_THRESHOLD || '5000'}" /></div>
        </div>
        <div class="form-group"><label>OCR 里程识别</label>
          <select id="s-ocr"><option value="true" ${s.OCR_ENABLED !== 'false' ? 'selected' : ''}>启用</option>
          <option value="false" ${s.OCR_ENABLED === 'false' ? 'selected' : ''}>关闭</option></select>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:12px;">💾 保存设置</button>
      </div>
      <!-- 全量备份 -->
      <div class="card" style="margin-top:16px;">
        <h4 style="margin-top:0;">⏰ 自动备份（全量）</h4>
        <p style="color:#888;font-size:12px;">定时备份整个数据库+照片，文件名为 <code>auto-backup-时间.tar.gz</code>。</p>
        <div class="row">
          <div class="form-group"><label>备份目录</label><input id="s-bak-dir" value="${s.BACKUP_DIR || '/vol2/1000/AI/车辆管理-备份'}" style="width:280px;" placeholder="填写完整路径，如 /vol2/1000/backups" /></div>
        </div>
        <div class="row">
          <div class="form-group"><label>备份间隔(小时)</label><input id="s-bak-interval" value="${s.BACKUP_INTERVAL_HOURS || '24'}" style="width:80px;" /></div>
          <div class="form-group"><label>保留最近(个)</label><input id="s-bak-retention" value="${s.BACKUP_RETENTION || '7'}" style="width:80px;" /></div>
          <div style="display:flex;align-items:flex-end;padding-bottom:4px;">
            <button class="btn btn-secondary" onclick="saveBackupSettings()" style="font-size:12px;">💾 保存</button>
          </div>
        </div>
        <div id="backup-files" style="margin-top:8px;"></div>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="doBackup()">📥 下载备份</button>
          <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📤 导入备份</button>
          <input type="file" id="import-file" accept=".tar.gz,.tgz" style="display:none" onchange="doImport(this)" />
          <button class="btn btn-secondary" onclick="doAutoBackup()">🔄 立即执行自动备份</button>
        </div>
        <div id="backup-status" style="margin-top:8px;font-size:13px;"></div>
      </div>
      <!-- 增量备份 -->
      <div class="card" style="margin-top:16px;">
        <h4 style="margin-top:0;">📦 定期增量备份</h4>
        <p style="color:#888;font-size:12px;">按时间范围导出业务数据（不含照片），文件名为 <code>regular-开始年-结束年.tar.gz</code>，导入冲突自动保留最新。</p>
        <div class="row">
          <div class="form-group"><label>启用</label>
            <select id="s-reg-enabled" style="width:80px;"><option value="true" ${s.REGULAR_BACKUP_ENABLED !== 'false' ? 'selected' : ''}>是</option>
            <option value="false" ${s.REGULAR_BACKUP_ENABLED === 'false' ? 'selected' : ''}>否</option></select>
          </div>
          <div class="form-group"><label>间隔(小时)</label><input id="s-reg-interval" value="${s.REGULAR_BACKUP_INTERVAL_HOURS || '168'}" style="width:80px;" title="默认 168h=7天" /></div>
          <div class="form-group"><label>每次备份(N天内)</label><input id="s-reg-days" value="${s.REGULAR_BACKUP_DAYS || '30'}" style="width:80px;" /></div>
          <div style="display:flex;align-items:flex-end;padding-bottom:4px;">
            <button class="btn btn-secondary" onclick="saveRegBackupSettings()" style="font-size:12px;">💾 保存</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
          <button class="btn btn-secondary" onclick="doRegBackup(30)">📥 导出近30天</button>
          <button class="btn btn-secondary" onclick="doRegBackup(90)">📥 导出近90天</button>
          <button class="btn btn-secondary" onclick="doRegBackup(365)">📥 导出近一年</button>
          <button class="btn btn-secondary" onclick="var d=prompt('导出近几天?','30');if(d)doRegBackup(parseInt(d))">📥 自定义天数</button>
          <button class="btn btn-secondary" onclick="document.getElementById('import-reg-file').click()">📤 导入增量备份</button>
          <input type="file" id="import-reg-file" accept=".tar.gz" style="display:none" onchange="doRegImport(this)" />
        </div>
        <div id="reg-backup-status" style="margin-top:6px;font-size:13px;"></div>
      </div>
    `;
    loadBackupList();
  } catch(e) { el.innerHTML = `<div class="card"><p>加载失败: ${e.message}</p></div>`; }
}

// ========== 操作日志 ==========
async function logs(el) {
  el.innerHTML = `<div class="page-title">📋 操作日志</div><div class="card"><p>加载中...</p></div>`;
  try {
    const d = await api('GET', '/api/logs?page=1&size=200');
    const list = d.items || d.logs || [];
    el.innerHTML = `
      <div class="page-title">📋 操作日志</div>
      <div class="card" style="max-height:70vh;overflow-y:auto;">
        ${list.length === 0 ? '<p style="color:#888;">暂无操作记录</p>' : `
        <table style="font-size:13px;">
          <tr><th>时间</th><th>用户</th><th>操作</th><th>对象</th></tr>
          ${list.map(l => `
            <tr>
              <td style="white-space:nowrap;color:#888;font-size:12px;">${new Date(l.created_at).toLocaleString()}</td>
              <td>${l.user_name || l.username || '-'}</td>
              <td>${l.action || ''}</td>
              <td style="color:#888;">${(l.target_type || '') + (l.target_id ? '#'+l.target_id : '')}</td>
            </tr>
          `).join('')}
        </table>`}
      </div>
    `;
  } catch(e) { el.innerHTML = `<div class="page-title">📋 操作日志</div><div class="card"><p class="error">加载失败: ${e.message}</p></div>`; }
}

// ========== Toast ==========
function toast(msg, isError) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ========== 备份功能 ==========
async function saveSettings() {
  const fields = [
    { key: 'DATA_DIR', id: 's-data_dir' },
    { key: 'PORT', id: 's-port' },
    { key: 'MILEAGE_THRESHOLD', id: 's-threshold' },
    { key: 'OCR_ENABLED', id: 's-ocr' },
  ];
  try {
    for (const f of fields) {
      const val = document.getElementById(f.id).value;
      await api('PUT', '/api/settings', { key: f.key, value: val });
    }
    toast('设置已保存，重启服务后生效');
  } catch(e) { toast('保存失败: ' + e.message, true); }
}

async function saveBackupSettings() {
  try {
    await api('PUT', '/api/settings', { key: 'BACKUP_DIR', value: document.getElementById('s-bak-dir').value });
    await api('PUT', '/api/settings', { key: 'BACKUP_INTERVAL_HOURS', value: document.getElementById('s-bak-interval').value });
    await api('PUT', '/api/settings', { key: 'BACKUP_RETENTION', value: document.getElementById('s-bak-retention').value });
    toast('备份设置已保存，重启后生效');
  } catch(e) { toast('保存失败: ' + e.message, true); }
}

async function saveRegBackupSettings() {
  try {
    await api('PUT', '/api/settings', { key: 'REGULAR_BACKUP_ENABLED', value: document.getElementById('s-reg-enabled').value });
    await api('PUT', '/api/settings', { key: 'REGULAR_BACKUP_INTERVAL_HOURS', value: document.getElementById('s-reg-interval').value });
    await api('PUT', '/api/settings', { key: 'REGULAR_BACKUP_DAYS', value: document.getElementById('s-reg-days').value });
    toast('增量备份设置已保存，重启后生效');
  } catch(e) { toast('保存失败: ' + e.message, true); }
}

async function loadBackupList() {
  try {
    const d = await api('GET', '/api/backup/list');
    const el = document.getElementById('backup-files');
    if (!el) return;
    if (!d.backups || d.backups.length === 0) {
      el.innerHTML = '<p style="color:#888;font-size:13px;">暂无自动备份文件</p>';
      return;
    }
    let html = '<p style="color:#888;font-size:13px;margin-bottom:4px;">已有的自动备份:</p><div style="max-height:180px;overflow-y:auto;"><table style="font-size:12px;">';
    for (const f of d.backups) {
      const sz = f.size > 1048576 ? (f.size/1048576).toFixed(1)+' MB' : (f.size/1024).toFixed(0)+' KB';
      const t = new Date(f.mtime).toLocaleString();
      html += `<tr><td style="padding:4px 6px;word-break:break-all;">${f.name}</td><td style="padding:4px 6px;">${sz}</td><td style="padding:4px 6px;font-size:11px;color:#888;">${t}</td>`;
      html += `<td style="padding:4px 6px;"><button class="btn btn-secondary" style="font-size:11px;padding:2px 6px;" onclick="downloadBackup('${f.name.replace(/'/g,"\\'")}')">📥</button> `;
      html += `<button class="btn btn-danger" style="font-size:11px;padding:2px 6px;" onclick="deleteBackup('${f.name.replace(/'/g,"\\'")}')">🗑️</button></td></tr>`;
    }
    html += '</table></div>';
    el.innerHTML = html;
  } catch(e) { /* ignore */ }
}

async function downloadBackup(name) {
  const token = localStorage.getItem('token');
  const r = await fetch('/api/backup/download/' + encodeURIComponent(name), {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (!r.ok) { toast('下载失败', true); return; }
  const blob = await r.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

async function deleteBackup(name) {
  if (!confirm('确定删除备份 ' + name + '？')) return;
  try {
    const r = await api('POST', '/api/backup/delete/' + encodeURIComponent(name));
    if (r.ok === false) throw new Error(r.message);
    toast('已删除');
    loadBackupList();
  } catch(e) { toast('删除失败: ' + e.message, true); }
}

async function doBackup() {
  const st = document.getElementById('backup-status');
  st.innerHTML = '⏳ 正在生成备份...';
  try {
    const token = localStorage.getItem('token');
    const r = await fetch('/api/backup/create', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!r.ok) throw new Error((await r.text()) || '备份失败');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const cd = r.headers.get('Content-Disposition') || '';
    const m = cd.match(/filename="?(.+?)"?$/);
    a.download = m ? m[1] : 'backup.tar.gz';
    a.click();
    URL.revokeObjectURL(url);
    st.innerHTML = '✅ 备份已下载';
  } catch(e) { st.innerHTML = '❌ ' + e.message; }
}

async function doAutoBackup() {
  const st = document.getElementById('backup-status');
  st.innerHTML = '⏳ 正在执行自动备份...';
  try {
    const d = await api('POST', '/api/backup/trigger-auto');
    st.innerHTML = '✅ ' + d.message;
    loadBackupList();
  } catch(e) { st.innerHTML = '❌ ' + e.message; }
}

async function doImport(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm('⚠️ 导入将覆盖当前所有数据（系统会自动备份当前数据）。确定继续？')) {
    input.value = '';
    return;
  }
  const st = document.getElementById('backup-status');
  st.innerHTML = '⏳ 正在恢复数据...';
  try {
    const token = localStorage.getItem('token');
    const form = new FormData();
    form.append('file', file);
    const r = await fetch('/api/backup/import', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: form,
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || d.message || '导入失败');
    st.innerHTML = '✅ ' + d.message;
    toast(d.message);
  } catch(e) { st.innerHTML = '❌ ' + e.message; }
  input.value = '';
}

async function doRegBackup(days) {
  const st = document.getElementById('reg-backup-status');
  st.innerHTML = '⏳ 正在导出增量备份...';
  try {
    const token = localStorage.getItem('token');
    const r = await fetch('/api/backup/regular/create?days=' + days, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!r.ok) throw new Error((await r.text()) || '导出失败');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const cd = r.headers.get('Content-Disposition') || '';
    const m = cd.match(/filename="?(.+?)"?$/);
    a.download = m ? m[1] : 'regular-backup.tar.gz';
    a.click();
    URL.revokeObjectURL(url);
    st.innerHTML = '✅ 增量备份已下载';
  } catch(e) { st.innerHTML = '❌ ' + e.message; }
}

async function doRegImport(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm('⚠️ 导入增量备份会合并数据，冲突自动保留最新记录。确定继续？')) {
    input.value = '';
    return;
  }
  const st = document.getElementById('reg-backup-status');
  st.innerHTML = '⏳ 正在导入...';
  try {
    const token = localStorage.getItem('token');
    const form = new FormData();
    form.append('file', file);
    const r = await fetch('/api/backup/regular/import?conflict=newer', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: form,
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || d.message || '导入失败');
    st.innerHTML = '✅ ' + d.message;
    toast(d.message);
  } catch(e) { st.innerHTML = '❌ ' + e.message; }
  input.value = '';
}
</script>
