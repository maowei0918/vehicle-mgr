<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登录 - 车辆管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F0F19;color:#E0E0E0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#1A1A2E;border:1px solid #3A3A4E;border-radius:12px;padding:40px;width:360px}
.login-box h2{text-align:center;color:#E82337;margin-bottom:8px;font-size:20px}
.login-box p{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-group input{width:100%;background:#2A2A3E;border:1px solid #3A3A4E;color:#E0E0E0;padding:10px 14px;border-radius:6px;font-size:14px;outline:none;transition:border 0.2s}
.form-group input:focus{border-color:#E82337}
.btn{width:100%;padding:10px;background:#E82337;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;transition:background 0.2s}
.btn:hover{background:#C91E2F}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.error{color:#EF9A9A;font-size:13px;text-align:center;margin-top:8px;display:none}
.loading{display:none;text-align:center;margin-top:12px}
.loading span{color:#888;font-size:13px}
</style>
</head>
<body>
<div class="login-box">
  <h2>🚗 车辆管理系统</h2>
  <p>请登录以继续</p>
  <div class="form-group"><label>用户名</label><input id="username" type="text" placeholder="admin" /></div>
  <div class="form-group"><label>密码</label><input id="password" type="password" placeholder="admin123" /></div>
  <button class="btn" id="login-btn" onclick="doLogin()">登 录</button>
  <div class="error" id="error-msg">用户名或密码错误</div>
  <div class="loading" id="loading"><span>登录中...</span></div>
</div>
<script>
async function doLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  const loading = document.getElementById('loading');
  const user = document.getElementById('username').value.trim();
  const pwd = document.getElementById('password').value.trim();
  if (!user || !pwd) { err.textContent='请输入用户名和密码'; err.style.display='block'; return; }
  btn.disabled = true; btn.textContent = '登录中...'; loading.style.display='block'; err.style.display='none';
  try {
    const r = await fetch('/api/auth/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pwd})});
    const data = await r.json();
    if (!r.ok) { throw new Error(data.detail||'登录失败'); }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/admin/index.html';
  } catch(e) {
    err.textContent = e.message; err.style.display='block';
    btn.disabled = false; btn.textContent = '登 录'; loading.style.display='none';
  }
}
document.getElementById('username').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
